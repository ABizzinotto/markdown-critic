name: "Markdown Critic"
description: "Review a blog post and provide spelling and grammar corrections."
author: "FastRuby.io"

inputs:
  openai_api_key:
    description: "OpenAI API key."
    required: true

  github_token:
    description: "GitHub token for authentication."
    required: true

runs:
  using: "docker"
  image: "Dockerfile"
  env:
    OPENAI_API_KEY: ${{ inputs.openai_api_key }}
    GITHUB_TOKEN: ${{ inputs.github_token }}
